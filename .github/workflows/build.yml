name: Build and Release

on:
  push:
    tags:
      - "v*.*.*" # Dispara ao fazer push de tag como v1.0.0

# Permite que o tauri-action crie a Release e faça upload dos artefatos.
permissions:
  contents: write

jobs:
  build:
    name: Build Desktop App
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf libappindicator3-dev

      - name: Install dependencies
        run: npm ci

      # A versão do latest.json (e do app) vem do tauri.conf.json, NÃO da tag.
      # Aqui sincronizamos: a tag v1.2.3 grava "version": "1.2.3" no config antes
      # do build, evitando o caso silencioso de "nenhuma atualização aparece"
      # quando a tag sobe mas a versão do config fica para trás.
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f,'utf8'));c.version=process.argv[1];fs.writeFileSync(f, JSON.stringify(c,null,2)+'\n');console.log('tauri.conf.json version => '+c.version);" "$VERSION"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Imperial App ${{ github.ref_name }}"
          releaseBody: "Veja os arquivos abaixo para baixar/atualizar."
          releaseDraft: false
          prerelease: false
